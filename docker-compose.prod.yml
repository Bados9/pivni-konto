services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
      - frontend_build:/var/www/html/frontend:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # To enable HTTPS, swap prod.conf for prod-ssl.conf after running setup-https.sh:
    # - ./docker/nginx/prod-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    # Dostupnost padel-app kontejneru přes host loopback (port 3101 bind na VPS).
    # nginx resolvuje host.docker.internal při startu z /etc/hosts, ne z Docker DNS.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - php
    networks:
      - pivnikonto

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    depends_on:
      - postgres
      - redis
    networks:
      - pivnikonto

  postgres:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - pivnikonto

  redis:
    image: redis:alpine
    restart: always
    networks:
      - pivnikonto

  adminer:
    image: adminer:latest
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - pivnikonto

  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_build:/app/dist
    command: sh -c "npm ci && npm run build"
    networks:
      - pivnikonto

volumes:
  postgres_data:
  frontend_build:

networks:
  pivnikonto:
