framework:
    secret: '%env(APP_SECRET)%'
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    http_method_override: false
    php_errors:
        log: true

    uid:
        default_uuid_version: 7
        time_based_uuid_version: 7
