# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/46-225-59-170.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/46-225-59-170.sslip.io/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/html/public;
    index index.php;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s;
    set $php_upstream php:9000;
    set $adminer_upstream adminer:8080;
    # Padel-app běží vedle pivnikonta ve vlastní docker síti. Nginx ho oslovuje
    # přes host-gateway (viz extra_hosts v docker-compose.prod.yml). Port 3101
    # je host-side bind padel-app-prod kontejneru.
    set $padel_upstream host.docker.internal:3101;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Padel-app (Next.js standalone). Musí být PŘED `location /`, jinak by to
    # catch-all SPA rule přehlušila. Next.js s basePath=/padel má kanonickou
    # URL bez trailing slash, takže musíme proxovat oba tvary – `/padel`
    # i `/padel/...`. Regex `^/padel(/|$)` se postará o obojí.
    location ~ ^/padel(/|$) {
        proxy_pass http://$padel_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # WebSocket / streaming (Next.js RSC, server actions)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Frontend (Vue SPA)
    location / {
        root /var/www/html/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Adminer
    location /adminer/ {
        proxy_pass http://$adminer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api {
        try_files $uri /index.php$is_args$args;
    }

    # PHP handling
    location ~ ^/index\.php(/|$) {
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # Block access to other PHP files
    location ~ \.php$ {
        return 404;
    }

    # EasyAdmin bundle assets (^~ takes priority over regex locations)
    location ^~ /bundles/ {
        root /var/www/html/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets (frontend)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /var/www/html/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
